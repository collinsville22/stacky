# --- Mock token (testing only) ---

[contracts.sbtc-token]
path = 'contracts/mock/sbtc-token.clar'
clarity_version = 3
epoch = 'latest'

# --- Prediction market contracts ---

[contracts.stacky-math]
path = 'contracts/prediction/stacky-math.clar'
clarity_version = 3
epoch = 'latest'

[contracts.stacky-governance-v2]
path = 'contracts/prediction/stacky-governance-v2.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-math']

[contracts.stacky-oracle-v3]
path = 'contracts/prediction/stacky-oracle-v3.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance-v2']

[contracts.stacky-outcome-tokens-v3]
path = 'contracts/prediction/stacky-outcome-tokens-v3.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance-v2', 'stacky-oracle-v3', 'sbtc-token']

[contracts.stacky-exchange-v6]
path = 'contracts/prediction/stacky-exchange-v6.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-outcome-tokens-v3', 'stacky-math', 'stacky-governance-v2', 'sbtc-token']

# --- Yield strategy contracts ---

[contracts.stacky-governance]
path = 'contracts/yield/stacky-governance.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-math']

[contracts.token-scbtc]
path = 'contracts/yield/token-scbtc.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance']

[contracts.token-sbbtc]
path = 'contracts/yield/token-sbbtc.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance']

[contracts.token-sabtc]
path = 'contracts/yield/token-sabtc.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance']

[contracts.stacky-aggregator]
path = 'contracts/yield/stacky-aggregator.clar'
clarity_version = 3
epoch = 'latest'
depends_on = ['stacky-governance', 'token-scbtc', 'token-sbbtc', 'token-sabtc']

# --- Analysis settings ---

[repl.analysis]
passes = ['check_checker']

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[repl.remote_data]
enabled = true
api_url = 'https://api.hiro.so'

clarity_version = 3
epoch = "latest"
depends_on = ["stacky-governance"]

clarity_version = 3
epoch = "latest"
depends_on = ["stacky-governance"]
